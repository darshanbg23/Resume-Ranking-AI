# render.yaml — Render Blueprint for Resume Ranking AI
# https://render.com/docs/blueprint-spec

services:
  # ── Backend (Django API) ──────────────────────────────────
  - type: web
    name: resume-ranking-api
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn RESUME_RANKING_AI.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: resume-ranking-api.onrender.com
      - key: FRONTEND_URL
        sync: false
      - key: API_KEY
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: resume-ranking-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11.6"

  # ── Frontend (React/Vite Static Site) ─────────────────────
  - type: web
    name: resume-ranking-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

# ── PostgreSQL Database ───────────────────────────────────────
databases:
  - name: resume-ranking-db
    plan: free
    databaseName: resume_ranking_ai
    user: resume_admin
